<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Poker Tournament</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

:root {
–bg:           #f0f2ee;
–surface:      #ffffff;
–surface2:     #f6f7f4;
–border:       #e0e5db;
–green:        #2e7d44;
–green-light:  #eaf3ec;
–green-mid:    #b8d9be;
–purple:       #6b3fa0;
–purple-light: #f1ebfa;
–purple-mid:   #c9aee8;
–red:          #b53a2e;
–amber:        #a06010;
–bust-color:   #999999;
–text:         #1a2a1c;
–text-muted:   #627564;
–text-light:   #9aab9c;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Inter’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
min-height: -webkit-fill-available;
overflow-x: hidden;
font-size: 14px;
}

/* Header */
.header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 10px 12px;
position: sticky;
top: 0;
z-index: 100;
display: flex;
gap: 8px;
}

.header-title { display: none; }

.header-stats { display: flex; gap: 8px; width: 100%; }

.stat-badge {
background: var(–green-light);
border: 1px solid var(–green-mid);
border-radius: 8px;
padding: 6px 4px;
text-align: center;
flex: 1;
}

.stat-badge strong {
display: block;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
color: var(–green);
letter-spacing: 1px;
line-height: 1.1;
}

.stat-badge span { font-size: 9px; color: var(–text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* Tabs */
.tabs {
display: flex;
background: var(–surface);
border-bottom: 1px solid var(–border);
}

.tab {
flex: 1;
padding: 11px 6px;
font-size: 12px;
font-weight: 700;
color: var(–text-muted);
text-align: center;
cursor: pointer;
border-bottom: 2px solid transparent;
margin-bottom: -1px;
text-transform: uppercase;
letter-spacing: 0.5px;
transition: color 0.15s, border-color 0.15s;
}

.tab.active { color: var(–green); border-bottom-color: var(–green); }

/* Content */
.content { padding: 14px; padding-bottom: 48px; }

/* Card */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px;
margin-bottom: 12px;
}

.card-title {
font-size: 10px;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-muted);
margin-bottom: 12px;
}

/* Inputs */
input[type=“text”], input[type=“number”] {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: ‘Inter’, sans-serif;
font-size: 14px;
padding: 10px 12px;
outline: none;
width: 100%;
appearance: none;
-webkit-appearance: none;
}

input:focus { border-color: var(–green); box-shadow: 0 0 0 3px #2e7d4418; }

.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.input-row input { flex: 1; }

/* Buttons */
.btn {
display: inline-flex;
align-items: center;
justify-content: center;
border: none;
border-radius: 8px;
font-family: ‘Inter’, sans-serif;
font-weight: 700;
font-size: 13px;
padding: 10px 16px;
cursor: pointer;
transition: opacity 0.12s, transform 0.12s;
white-space: nowrap;
letter-spacing: 0.2px;
}

.btn:active { opacity: 0.78; transform: scale(0.97); }
.btn-green  { background: var(–green); color: #fff; }
.btn-red    { background: var(–red);   color: #fff; }
.btn-amber  { background: var(–amber); color: #fff; }
.btn-ghost  { background: var(–surface2); color: var(–text); border: 1px solid var(–border); }
.btn-sm     { padding: 7px 12px; font-size: 12px; border-radius: 7px; }
.btn-full   { width: 100%; }

.btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-row .btn { flex: 1; }

/* Section label */
.section-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–text-light);
margin-bottom: 8px;
padding-bottom: 6px;
border-bottom: 1px solid var(–border);
}

/* Player list */
.player-list { display: flex; flex-direction: column; gap: 7px; }

.player-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px;
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
position: relative;
overflow: hidden;
transition: background 0.1s;
}

.player-item:active { background: var(–surface2); }

.player-item::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 3px;
}

.player-item.status-active::before { background: var(–green); }
.player-item.status-bust::before   { background: var(–border); }

.player-rank {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 17px;
color: var(–text-light);
min-width: 24px;
text-align: center;
flex-shrink: 0;
}

.player-info { flex: 1; min-width: 0; }

.player-name {
font-weight: 700;
font-size: 14px;
color: var(–text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.player-name.is-bust { color: var(–text-muted); }

.player-sub {
font-size: 11px;
color: var(–text-muted);
margin-top: 2px;
display: flex;
align-items: center;
gap: 5px;
}

.ra-pill {
display: inline-block;
font-size: 10px;
font-weight: 700;
padding: 1px 6px;
border-radius: 4px;
background: var(–purple-light);
color: var(–purple);
border: 1px solid var(–purple-mid);
letter-spacing: 0.2px;
flex-shrink: 0;
}

.player-right {
flex-shrink: 0;
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 3px;
}

.status-tag {
font-size: 10px;
font-weight: 700;
padding: 2px 8px;
border-radius: 20px;
white-space: nowrap;
}

.tag-active { background: var(–green-light); color: var(–green); border: 1px solid var(–green-mid); }
.tag-bust   { background: #f4f4f4; color: var(–bust-color); border: 1px solid #ddd; }

.bust-rank {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 14px;
color: var(–bust-color);
letter-spacing: 0.5px;
}

/* Modal */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: #00000050;
z-index: 200;
align-items: flex-end;
justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
background: var(–surface);
border-radius: 16px 16px 0 0;
border: 1px solid var(–border);
border-bottom: none;
padding: 18px 16px 40px;
width: 100%;
max-height: 88vh;
overflow-y: auto;
animation: slideUp 0.22s ease;
box-shadow: 0 -6px 30px #00000018;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
width: 32px; height: 4px;
background: var(–border);
border-radius: 2px;
margin: 0 auto 14px;
}

.modal-player-name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 2px;
color: var(–text);
margin-bottom: 2px;
}

.modal-player-sub {
font-size: 12px;
color: var(–text-muted);
margin-bottom: 16px;
}

hr { border: none; border-top: 1px solid var(–border); margin: 14px 0; }

/* R/A counter */
.ra-control {
background: var(–purple-light);
border: 1px solid var(–purple-mid);
border-radius: 10px;
padding: 12px 14px;
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 8px;
}

.ra-control-label { font-weight: 700; font-size: 14px; color: var(–purple); }
.ra-control-sub   { font-size: 11px; color: var(–text-muted); margin-top: 1px; }

.ra-counter { display: flex; align-items: center; gap: 10px; }

.ra-btn {
width: 32px; height: 32px;
border-radius: 7px;
border: 1px solid var(–purple-mid);
background: var(–surface);
color: var(–purple);
font-size: 18px;
font-weight: 700;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.12s;
flex-shrink: 0;
}

.ra-btn:active { background: var(–purple-mid); }

.ra-count-display {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 24px;
color: var(–purple);
min-width: 24px;
text-align: center;
letter-spacing: 1px;
}

/* Toast */
.toast {
position: fixed;
bottom: 72px;
left: 50%;
transform: translateX(-50%) translateY(120px);
background: var(–text);
color: #fff;
border-radius: 20px;
padding: 9px 20px;
font-size: 13px;
font-weight: 600;
z-index: 300;
transition: transform 0.28s ease;
white-space: nowrap;
box-shadow: 0 4px 16px #00000030;
pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(–text-light); }
.empty-state .empty-icon {
width: 40px; height: 40px;
border: 2px solid var(–border);
border-radius: 8px;
margin: 0 auto 12px;
display: flex; align-items: center; justify-content: center;
}
.empty-icon-inner { width: 16px; height: 16px; background: var(–border); border-radius: 2px; }
.empty-state p { font-size: 13px; }
</style>

</head>
<body>

<!-- Bulk Add Modal -->

<div class="modal-overlay" id="bulk-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-player-name" style="margin-bottom:10px">Bulk Add</div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Enter one name per line.</p>
    <textarea id="bulk-names" style="width:100%;height:130px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px;outline:none;resize:none;" placeholder="Alice&#10;Bob&#10;Charlie"></textarea>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-ghost" onclick="closeBulkModal()">Cancel</button>
      <button class="btn btn-green" onclick="bulkAddPlayers()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { players: [] };
let selectedPlayerId = null;
let nextPlayerId = 1;

function loadState() {
  try {
    const saved = localStorage.getItem('poker_v7');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { players: [], ...parsed };
      if (state.players.length > 0) {
        nextPlayerId = Math.max(...state.players.map(p => p.id)) + 1;
      }
    }
  } catch(e) {}
  updateAll();
}

function saveState() {
  try { localStorage.setItem('poker_v7', JSON.stringify(state)); } catch(e) {}
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

function totalPlayers() { return state.players.length; }

// ---- Add Players ----
function addPlayer() {
  const input = document.getElementById('player-name-input');
  const name = input.value.trim();
  if (!name) { showToast('Please enter a name.'); return; }
  state.players.push({ id: nextPlayerId++, name, status: 'active', ra: 0, bustPosition: null });
  input.value = '';
  saveState(); updateAll();
  showToast(`${name} added.`);
}

function openBulkAdd() { document.getElementById('bulk-modal').classList.add('open'); }
function closeBulkModal() { document.getElementById('bulk-modal').classList.remove('open'); }

function bulkAddPlayers() {
  const names = document.getElementById('bulk-names').value
    .split('\n').map(s => s.trim()).filter(s => s.length > 0);
  if (!names.length) { showToast('Enter at least one name.'); return; }
  names.forEach(name => {
    state.players.push({ id: nextPlayerId++, name, status: 'active', ra: 0, bustPosition: null });
  });
  document.getElementById('bulk-names').value = '';
  closeBulkModal();
  saveState(); updateAll();
  showToast(`${names.length} player${names.length > 1 ? 's' : ''} added.`);
}

// ---- Player Modal ----
function openPlayerModal(id) {
  selectedPlayerId = id;
  const p = state.players.find(x => x.id === id);
  if (!p) return;

  document.getElementById('modal-player-name').textContent = p.name;

  const isBust = p.status === 'bust';
  document.getElementById('modal-player-sub').textContent = isBust
    ? `Busted — ${p.bustPosition}${ordinal(p.bustPosition)} place / ${totalPlayers()} players`
    : 'Active';

  document.getElementById('ra-count-display').textContent = p.ra || 0;
  document.getElementById('modal-active-section').style.display = isBust ? 'none' : '';
  document.getElementById('modal-bust-section').style.display   = isBust ? '' : 'none';

  document.getElementById('player-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('player-modal').classList.remove('open');
  selectedPlayerId = null;
}

// ---- R/A ----
function changeRA(delta) {
  if (!selectedPlayerId) return;
  const p = state.players.find(x => x.id === selectedPlayerId);
  p.ra = Math.max(0, (p.ra || 0) + delta);
  document.getElementById('ra-count-display').textContent = p.ra;
  saveState(); updateAll();
}

// ---- Bust / Revive ----
function bustPlayer() {
  if (!selectedPlayerId) return;
  const p = state.players.find(x => x.id === selectedPlayerId);
  const alreadyBust = state.players.filter(x => x.status === 'bust').length;
  p.bustPosition = totalPlayers() - alreadyBust;
  p.status = 'bust';
  saveState(); updateAll(); closeModal();
  showToast(`${p.name} busted in ${p.bustPosition}${ordinal(p.bustPosition)} place.`);
}

function revivePlayer() {
  if (!selectedPlayerId) return;
  const p = state.players.find(x => x.id === selectedPlayerId);
  p.status = 'active';
  p.bustPosition = null;
  saveState(); updateAll(); closeModal();
  showToast(`${p.name} has been revived.`);
}

// ---- Settings ----
function resetTournament() {
  if (!confirm('Reset the entire tournament? All data will be lost.')) return;
  state.players = [];
  nextPlayerId = 1;
  saveState(); updateAll();
  showToast('Tournament reset.');
}

function exportData() {
  const total = totalPlayers();
  const active = state.players.filter(p => p.status !== 'bust');
  const bust = state.players.filter(p => p.status === 'bust')
    .sort((a, b) => a.bustPosition - b.bustPosition);

  let text = `=== POKER TOURNAMENT ===\n${new Date().toLocaleString('en')}\n\n`;
  text += `[Active — ${active.length} players]\n`;
  active.forEach((p, i) => {
    text += `${i + 1}. ${p.name}${p.ra > 0 ? ` (R/A x${p.ra})` : ''}\n`;
  });
  text += `\n[Busted — ${bust.length} players]\n`;
  bust.forEach(p => {
    text += `${p.bustPosition}/${total}  ${p.name}${p.ra > 0 ? ` (R/A x${p.ra})` : ''}\n`;
  });

  if (navigator.share) navigator.share({ title: 'Tournament Results', text });
  else alert(text);
}

// ---- Render ----
function updateAll() {
  renderPlayers();
  updateHeader();
}

function updateHeader() {
  const active = state.players.filter(p => p.status !== 'bust').length;
  const entries = state.players.reduce((sum, p) => sum + 1 + (p.ra || 0), 0);
  document.getElementById('hdr-active').textContent = active;
  document.getElementById('hdr-entries').textContent = entries;
  document.getElementById('hdr-total').textContent = state.players.length;
  document.getElementById('player-count').textContent = state.players.length;
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  if (!state.players.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon"><div class="empty-icon-inner"></div></div>
      <p>No players yet. Go to Settings to add players.</p>
    </div>`;
    return;
  }

  const total = totalPlayers();
  const active = state.players.filter(p => p.status !== 'bust');
  const bust = state.players.filter(p => p.status === 'bust')
    .sort((a, b) => a.bustPosition - b.bustPosition);

  let html = '';

  active.forEach((p, i) => {
    const raPills = p.ra > 0
      ? Array(p.ra).fill('<span class="ra-pill">R/A</span>').join('')
      : '';
    html += `<div class="player-item status-active" onclick="openPlayerModal(${p.id})">
      <div class="player-rank">${i + 1}</div>
      <div class="player-info">
        <div class="player-name">${escHtml(p.name)}</div>
        <div class="player-sub">Active${raPills ? '&ensp;' + raPills : ''}</div>
      </div>
      <div class="player-right">
        <span class="status-tag tag-active">Playing</span>
      </div>
    </div>`;
  });

  if (bust.length > 0) {
    html += `<div class="section-label" style="margin-top:14px">Busted (${bust.length})</div>`;
    bust.forEach(p => {
      const raPills = p.ra > 0
        ? Array(p.ra).fill('<span class="ra-pill" style="opacity:0.6">R/A</span>').join('')
        : '';
      html += `<div class="player-item status-bust" onclick="openPlayerModal(${p.id})">
        <div class="player-rank" style="color:#ccc;font-size:12px">—</div>
        <div class="player-info">
          <div class="player-name is-bust">${escHtml(p.name)}</div>
          <div class="player-sub">Busted${raPills ? '&ensp;' + raPills : ''}</div>
        </div>
        <div class="player-right">
          <div class="bust-rank">${p.bustPosition} / ${total}</div>
          <span class="status-tag tag-bust">Bust</span>
        </div>
      </div>`;
    });
  }

  list.innerHTML = html;
}

// ---- Tabs ----
const TAB_NAMES = ['players', 'settings'];
function switchTab(name) {
  TAB_NAMES.forEach((t, i) => {
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === name);
  });
}

// ---- Modal overlay close ----
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      selectedPlayerId = null;
    }
  });
});

loadState();
</script>
