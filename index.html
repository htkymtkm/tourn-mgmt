<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Poker">
<title>Poker Tournament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%232e7d44'/%3E%3Crect x='48' y='30' width='24' height='52' rx='3' fill='%23ffffff'/%3E%3Crect x='20' y='50' width='24' height='32' rx='3' fill='%23b8d9be'/%3E%3Crect x='76' y='42' width='24' height='40' rx='3' fill='%23b8d9be'/%3E%3Crect x='14' y='82' width='92' height='6' rx='3' fill='%23ffffff'/%3E%3C/svg%3E">
<style>
/* ---- Reset ---- */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2ee;
  color: #1a2a1c;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 14px;
}

/* ---- Header ---- */
.header {
  background: #ffffff;
  border-bottom: 1px solid #e0e5db;
  padding: 10px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  gap: 8px;
}

.header-stats {
  display: flex;
  gap: 8px;
  width: 100%;
}

.stat-badge {
  background: #eaf3ec;
  border: 1px solid #b8d9be;
  border-radius: 8px;
  padding: 6px 4px;
  text-align: center;
  flex: 1;
}

.stat-badge strong {
  display: block;
  font-family: 'Bebas Neue', 'Inter', sans-serif;
  font-size: 20px;
  color: #2e7d44;
  letter-spacing: 1px;
  line-height: 1.1;
}

.stat-badge span {
  font-size: 9px;
  color: #627564;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ---- Tabs ---- */
.tabs {
  display: flex;
  background: #ffffff;
  border-bottom: 1px solid #e0e5db;
}

.tab {
  flex: 1;
  padding: 11px 6px;
  font-size: 12px;
  font-weight: 700;
  color: #627564;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: 'Inter', -apple-system, sans-serif;
}

.tab.active { color: #2e7d44; border-bottom-color: #2e7d44; }

/* ---- Content ---- */
.content { padding: 14px; padding-bottom: 48px; }

/* ---- Card ---- */
.card {
  background: #ffffff;
  border: 1px solid #e0e5db;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #627564;
  margin-bottom: 12px;
  font-family: 'Inter', -apple-system, sans-serif;
}

/* ---- Inputs ---- */
input[type="text"], input[type="number"], textarea {
  background: #f6f7f4;
  border: 1px solid #e0e5db;
  border-radius: 8px;
  color: #1a2a1c;
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}

input[type="text"]:focus,
input[type="number"]:focus,
textarea:focus {
  border-color: #2e7d44;
  -webkit-box-shadow: 0 0 0 3px rgba(46,125,68,0.12);
  box-shadow: 0 0 0 3px rgba(46,125,68,0.12);
}

.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.input-row input { flex: 1; width: auto; }

/* ---- Buttons ---- */
.btn {
  display: -webkit-inline-flex;
  display: inline-flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  border: none;
  border-radius: 8px;
  font-family: 'Inter', -apple-system, sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 16px;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.2px;
  -webkit-transition: opacity 0.12s;
  transition: opacity 0.12s;
}

.btn:active { opacity: 0.75; }

.btn-green  { background: #2e7d44; color: #ffffff; }
.btn-red    { background: #b53a2e; color: #ffffff; }
.btn-amber  { background: #a06010; color: #ffffff; }
.btn-ghost  { background: #f6f7f4; color: #1a2a1c; border: 1px solid #e0e5db; }
.btn-white-red { background: #ffffff; color: #b53a2e; border: 1px solid #e0e5db; }
.btn-sm     { padding: 7px 12px; font-size: 12px; border-radius: 7px; }
.btn-full   { width: 100%; }

.btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
.btn-row .btn { flex: 1; }

/* ---- Section label ---- */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #9aab9c;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid #e0e5db;
  font-family: 'Inter', -apple-system, sans-serif;
}

/* ---- Player list ---- */
.player-list { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 7px; }

.player-item {
  background: #ffffff;
  border: 1px solid #e0e5db;
  border-radius: 10px;
  padding: 12px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.player-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}

.player-item.status-active::before { background: #2e7d44; }
.player-item.status-bust::before   { background: #e0e5db; }

.player-rank {
  font-family: 'Bebas Neue', 'Inter', sans-serif;
  font-size: 17px;
  color: #9aab9c;
  min-width: 24px;
  text-align: center;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}

.player-info { -webkit-flex: 1; flex: 1; min-width: 0; }

.player-name {
  font-weight: 700;
  font-size: 14px;
  color: #1a2a1c;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-name.is-bust { color: #627564; }

.player-sub {
  font-size: 11px;
  color: #627564;
  margin-top: 2px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 4px;
}

.ra-pill {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  background: #f1ebfa;
  color: #6b3fa0;
  border: 1px solid #c9aee8;
  letter-spacing: 0.2px;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}

.ra-pill.dim { opacity: 0.6; }

.player-right {
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: flex-end;
  align-items: flex-end;
  gap: 3px;
}

.status-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  font-family: 'Inter', -apple-system, sans-serif;
}

.tag-active { background: #eaf3ec; color: #2e7d44; border: 1px solid #b8d9be; }
.tag-bust   { background: #f4f4f4; color: #999999; border: 1px solid #dddddd; }

.bust-rank {
  font-family: 'Bebas Neue', 'Inter', sans-serif;
  font-size: 14px;
  color: #999999;
  letter-spacing: 0.5px;
}

/* ---- Modal ---- */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.32);
  z-index: 200;
  -webkit-align-items: flex-end;
  align-items: flex-end;
  -webkit-justify-content: center;
  justify-content: center;
}

.modal-overlay.open { display: -webkit-flex; display: flex; }

.modal {
  background: #ffffff;
  border-radius: 16px 16px 0 0;
  border: 1px solid #e0e5db;
  border-bottom: none;
  padding: 18px 16px 40px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  -webkit-animation: slideUp 0.22s ease;
  animation: slideUp 0.22s ease;
}

@-webkit-keyframes slideUp { from { -webkit-transform: translateY(100%); } to { -webkit-transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
  width: 32px; height: 4px;
  background: #e0e5db;
  border-radius: 2px;
  margin: 0 auto 14px;
}

.modal-player-name {
  font-family: 'Bebas Neue', 'Inter', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: #1a2a1c;
  margin-bottom: 2px;
}

.modal-player-sub {
  font-size: 12px;
  color: #627564;
  margin-bottom: 16px;
}

hr { border: none; border-top: 1px solid #e0e5db; margin: 14px 0; }

/* ---- R/A counter ---- */
.ra-control {
  background: #f1ebfa;
  border: 1px solid #c9aee8;
  border-radius: 10px;
  padding: 12px 14px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  margin-bottom: 8px;
}

.ra-control-label { font-weight: 700; font-size: 14px; color: #6b3fa0; font-family: 'Inter', sans-serif; }
.ra-control-sub   { font-size: 11px; color: #627564; margin-top: 1px; }

.ra-counter { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; }

.ra-btn {
  width: 32px; height: 32px;
  border-radius: 7px;
  border: 1px solid #c9aee8;
  background: #ffffff;
  color: #6b3fa0;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}

.ra-btn:active { background: #c9aee8; }

.ra-count-display {
  font-family: 'Bebas Neue', 'Inter', sans-serif;
  font-size: 24px;
  color: #6b3fa0;
  min-width: 24px;
  text-align: center;
  letter-spacing: 1px;
}

/* ---- Reset confirm ---- */
.reset-confirm-box {
  display: none;
  background: #b53a2e;
  border-radius: 8px;
  padding: 12px;
  margin-top: 4px;
}

.reset-confirm-box p {
  color: #ffffff;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  font-family: 'Inter', sans-serif;
}

/* ---- Toast ---- */
.toast {
  position: fixed;
  bottom: 72px;
  left: 50%;
  -webkit-transform: translateX(-50%) translateY(120px);
  transform: translateX(-50%) translateY(120px);
  background: #1a2a1c;
  color: #ffffff;
  border-radius: 20px;
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 600;
  z-index: 300;
  -webkit-transition: -webkit-transform 0.28s ease;
  transition: transform 0.28s ease;
  white-space: nowrap;
  pointer-events: none;
  font-family: 'Inter', sans-serif;
}

.toast.show {
  -webkit-transform: translateX(-50%) translateY(0);
  transform: translateX(-50%) translateY(0);
}

/* ---- Empty state ---- */
.empty-state { text-align: center; padding: 40px 20px; color: #9aab9c; }
.empty-icon {
  width: 40px; height: 40px;
  border: 2px solid #e0e5db;
  border-radius: 8px;
  margin: 0 auto 12px;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}
.empty-icon-inner { width: 16px; height: 16px; background: #e0e5db; border-radius: 2px; }
.empty-state p { font-size: 13px; font-family: 'Inter', sans-serif; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-stats">
    <div class="stat-badge">
      <strong id="hdr-active">0</strong>
      <span>Active</span>
    </div>
    <div class="stat-badge">
      <strong id="hdr-entries">0</strong>
      <span>Entries</span>
    </div>
    <div class="stat-badge">
      <strong id="hdr-total">0</strong>
      <span>Players</span>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('players')">Players</div>
  <div class="tab" onclick="switchTab('settings')">Settings</div>
</div>

<!-- Players Tab -->
<div id="tab-players" class="content">
  <div class="section-label">Players (<span id="player-count">0</span>)</div>
  <div id="player-list" class="player-list">
    <div class="empty-state">
      <div class="empty-icon"><div class="empty-icon-inner"></div></div>
      <p>No players yet. Go to Settings to add players.</p>
    </div>
  </div>
</div>

<!-- Settings Tab -->
<div id="tab-settings" class="content" style="display:none">
  <div class="card">
    <div class="card-title">Add Player</div>
    <div class="input-row">
      <input type="text" id="player-name-input" placeholder="Enter name..." maxlength="16">
      <button class="btn btn-green" onclick="addPlayer()">Add</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost btn-sm" onclick="openBulkAdd()">Bulk Add</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title" onclick="toggleRemovePanel()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:0;">
      <span>Remove Player</span>
      <span id="remove-chevron" style="font-size:12px;color:#9aab9c;transition:transform 0.2s;">▼</span>
    </div>
    <div id="remove-player-panel" style="display:none;margin-top:12px;">
      <div id="remove-player-list">
        <p style="font-size:13px;color:#9aab9c;font-family:'Inter',sans-serif;">No players added yet.</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="resetTournament()">Reset All</button>
      <button class="btn btn-ghost" onclick="exportData()">Export</button>
    </div>
    <div class="reset-confirm-box" id="reset-confirm">
      <p>Reset all data? This cannot be undone.</p>
      <div class="btn-row" style="margin-bottom:0">
        <button class="btn btn-ghost" onclick="resetCancelled()">Cancel</button>
        <button class="btn btn-white-red" onclick="resetConfirmed()">Reset</button>
      </div>
    </div>
  </div>
</div>

<!-- Player Modal -->
<div class="modal-overlay" id="player-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-player-name" id="modal-player-name"></div>
    <div class="modal-player-sub" id="modal-player-sub"></div>

    <div class="ra-control">
      <div>
        <div class="ra-control-label">R/A (Rebuy / Add-on)</div>
        <div class="ra-control-sub">Number of rebuys / add-ons</div>
      </div>
      <div class="ra-counter">
        <button class="ra-btn" onclick="changeRA(-1)">−</button>
        <div class="ra-count-display" id="ra-count-display">0</div>
        <button class="ra-btn" onclick="changeRA(1)">+</button>
      </div>
    </div>

    <div id="modal-active-section">
      <hr>
      <button class="btn btn-red btn-full" onclick="bustPlayer()">Mark as Bust</button>
    </div>

    <div id="modal-bust-section" style="display:none">
      <hr>
      <button class="btn btn-amber btn-full" onclick="revivePlayer()">Revive Player</button>
    </div>

    <hr>
    <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9aab9c;margin-bottom:6px;font-family:'Inter',sans-serif;">Memo</div>
    <input type="text" id="modal-memo" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. chip count..." style="margin-bottom:0;" oninput="saveMemo()">

    <hr>
    <button class="btn btn-ghost btn-full" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- Bulk Add Modal -->
<div class="modal-overlay" id="bulk-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-player-name" style="margin-bottom:10px">Bulk Add</div>
    <p style="font-size:12px;color:#627564;margin-bottom:10px;font-family:'Inter',sans-serif">Enter one name per line.</p>
    <textarea id="bulk-names" style="height:130px;resize:none;" placeholder="Alice&#10;Bob&#10;Charlie"></textarea>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-ghost" onclick="closeBulkModal()">Cancel</button>
      <button class="btn btn-green" onclick="bulkAddPlayers()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var state = { players: [] };
var selectedPlayerId = null;
var nextPlayerId = 1;

function loadState() {
  try {
    var saved = localStorage.getItem('poker_v7');
    if (saved) {
      var parsed = JSON.parse(saved);
      state = { players: [], };
      if (parsed.players) state.players = parsed.players;
      if (state.players.length > 0) {
        nextPlayerId = Math.max.apply(null, state.players.map(function(p){ return p.id; })) + 1;
      }
    }
  } catch(e) {}
  updateAll();
}

function saveState() {
  try { localStorage.setItem('poker_v7', JSON.stringify(state)); } catch(e) {}
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 2400);
}

function ordinal(n) {
  var s = ['th','st','nd','rd'], v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

function totalPlayers() { return state.players.length; }

/* ---- Add Players ---- */
function addPlayer() {
  var input = document.getElementById('player-name-input');
  var name = input.value.trim();
  if (!name) { showToast('Please enter a name.'); return; }
  // 既存のbust済みプレイヤーの分子・分母を+1
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].status === 'bust') {
      state.players[i].bustPosition += 1;
      state.players[i].bustTotal += 1;
    }
  }
  state.players.push({ id: nextPlayerId++, name: name, status: 'active', ra: 0, bustPosition: null, bustTotal: null });
  input.value = '';
  saveState(); updateAll();
  showToast(name + ' added.');
}

function openBulkAdd() { document.getElementById('bulk-modal').classList.add('open'); }
function closeBulkModal() { document.getElementById('bulk-modal').classList.remove('open'); }

function bulkAddPlayers() {
  var lines = document.getElementById('bulk-names').value.split('\n');
  var names = [];
  for (var i = 0; i < lines.length; i++) {
    var n = lines[i].trim();
    if (n.length > 0) names.push(n);
  }
  if (!names.length) { showToast('Enter at least one name.'); return; }
  // 既存のbust済みプレイヤーの分子・分母を追加人数分+する
  var addCount = names.length;
  for (var k = 0; k < state.players.length; k++) {
    if (state.players[k].status === 'bust') {
      state.players[k].bustPosition += addCount;
      state.players[k].bustTotal += addCount;
    }
  }
  for (var j = 0; j < names.length; j++) {
    state.players.push({ id: nextPlayerId++, name: names[j], status: 'active', ra: 0, bustPosition: null, bustTotal: null });
  }
  document.getElementById('bulk-names').value = '';
  closeBulkModal();
  saveState(); updateAll();
  showToast(names.length + ' player' + (names.length > 1 ? 's' : '') + ' added.');
}

/* ---- Player Modal ---- */
function openPlayerModal(id) {
  selectedPlayerId = id;
  var p = null;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].id === id) { p = state.players[i]; break; }
  }
  if (!p) return;

  document.getElementById('modal-player-name').textContent = p.name;
  var isBust = p.status === 'bust';
  document.getElementById('modal-player-sub').textContent = isBust
    ? 'Busted — ' + p.bustPosition + ordinal(p.bustPosition) + ' place / ' + totalPlayers() + ' players'
    : 'Active';
  document.getElementById('ra-count-display').textContent = p.ra || 0;
  document.getElementById('modal-memo').value = p.memo || '';
  document.getElementById('modal-active-section').style.display = isBust ? 'none' : '';
  document.getElementById('modal-bust-section').style.display   = isBust ? '' : 'none';
  document.getElementById('player-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('player-modal').classList.remove('open');
  selectedPlayerId = null;
}

function saveMemo() {
  if (!selectedPlayerId) return;
  var p = null;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].id === selectedPlayerId) { p = state.players[i]; break; }
  }
  if (!p) return;
  p.memo = document.getElementById('modal-memo').value;
  saveState(); updateAll();
}

/* ---- R/A ---- */
function changeRA(delta) {
  if (!selectedPlayerId) return;
  var p = null;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].id === selectedPlayerId) { p = state.players[i]; break; }
  }
  if (!p) return;
  p.ra = Math.max(0, (p.ra || 0) + delta);
  document.getElementById('ra-count-display').textContent = p.ra;
  saveState(); updateAll();
}

/* ---- Bust / Revive ---- */
function bustPlayer() {
  if (!selectedPlayerId) return;
  var p = null;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].id === selectedPlayerId) { p = state.players[i]; break; }
  }
  if (!p) return;

  var activeCount = 0;
  for (var j = 0; j < state.players.length; j++) {
    if (state.players[j].status === 'active') activeCount++;
  }
  p.bustPosition = activeCount;
  p.bustTotal = state.players.length; // bust時点の総人数を記録
  p.status = 'bust';
  saveState(); updateAll(); closeModal();
  showToast(p.name + ' busted in ' + p.bustPosition + ordinal(p.bustPosition) + ' place.');
}

function revivePlayer() {
  if (!selectedPlayerId) return;
  var p = null;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].id === selectedPlayerId) { p = state.players[i]; break; }
  }
  if (!p) return;

  var revivedPos = p.bustPosition;

  for (var k = 0; k < state.players.length; k++) {
    var q = state.players[k];
    if (q.status === 'bust' && q.id !== p.id && q.bustPosition <= revivedPos) {
      q.bustPosition += 1;
      // bustTotalも1減らす（復帰により当時の人数が1人分減ったとみなす）
      if (q.bustTotal > 0) q.bustTotal -= 1;
    }
  }

  p.status = 'active';
  p.bustPosition = null;
  p.bustTotal = null;
  saveState(); updateAll(); closeModal();
  showToast(p.name + ' has been revived.');
}

/* ---- Settings ---- */
function resetTournament() {
  document.getElementById('reset-confirm').style.display = 'block';
}

function resetConfirmed() {
  document.getElementById('reset-confirm').style.display = 'none';
  state.players = [];
  nextPlayerId = 1;
  saveState(); updateAll();
  showToast('Tournament reset.');
}

function resetCancelled() {
  document.getElementById('reset-confirm').style.display = 'none';
}

function exportData() {
  var total = totalPlayers();
  var active = [], bust = [];
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].status !== 'bust') active.push(state.players[i]);
    else bust.push(state.players[i]);
  }
  bust.sort(function(a, b){ return a.bustPosition - b.bustPosition; });

  var now = new Date();
  var dateStr = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate();

  var entries = 0;
  for (var e = 0; e < state.players.length; e++) {
    entries += 1 + (state.players[e].ra || 0);
  }

  // R/A表示ヘルパー: 1回は(R/A)、2回以上は(R/A x2)
  function raStr(ra) {
    if (!ra || ra === 0) return '';
    return ra === 1 ? ' (R/A)' : ' (R/A x' + ra + ')';
  }

  // 順位、メモ、名前、R/A の順
  function formatLine(rank, denom, player) {
    var memo = player.memo ? player.memo + '  ' : '';
    return rank + '/' + denom + '  ' + memo + player.name + raStr(player.ra) + '\n';
  }

  var text = '=== POKER TOURNAMENT ===\n' + dateStr + '\n';

  if (active.length === 0) {
    text += '[' + total + ' players / ' + entries + ' Entries]\n';
    for (var k = 0; k < bust.length; k++) {
      var bp = bust[k];
      text += bp.bustPosition + '/' + (bp.bustTotal || total) + '  ' + bp.name + raStr(bp.ra) + '\n';
    }
  } else {
    text += '\n[Active — ' + active.length + ' players]\n';
    for (var j = 0; j < active.length; j++) {
      var p = active[j];
      var memo = p.memo ? p.memo + '  ' : '';
      text += (j+1) + '/' + total + '  ' + memo + p.name + raStr(p.ra) + '\n';
    }
    text += '\n[Busted — ' + bust.length + ' players]\n';
    for (var k2 = 0; k2 < bust.length; k2++) {
      var bp2 = bust[k2];
      text += formatLine(bp2.bustPosition, bp2.bustTotal || total, bp2);
    }
  }

  if (navigator.share) {
    navigator.share({ title: 'Tournament Results', text: text }).catch(function(){ copyToClipboard(text); });
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){
      showToast('Copied to clipboard.');
    }).catch(function(){ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('Copied to clipboard.'); }
  catch(e) { showToast('Copy failed.'); }
  document.body.removeChild(ta);
}

/* ---- Render ---- */
function updateAll() {
  renderPlayers();
  renderRemovePlayers();
  updateHeader();
}

function updateHeader() {
  var active = 0, entries = 0;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].status !== 'bust') active++;
    entries += 1 + (state.players[i].ra || 0);
  }
  document.getElementById('hdr-active').textContent = active;
  document.getElementById('hdr-entries').textContent = entries;
  document.getElementById('hdr-total').textContent = state.players.length;
  document.getElementById('player-count').textContent = state.players.length;
}

function renderPlayers() {
  var list = document.getElementById('player-list');
  if (!state.players.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon"><div class="empty-icon-inner"></div></div><p>No players yet. Go to Settings to add players.</p></div>';
    return;
  }

  var total = totalPlayers();
  var active = [], bust = [];
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].status !== 'bust') active.push(state.players[i]);
    else bust.push(state.players[i]);
  }
  bust.sort(function(a, b){ return a.bustPosition - b.bustPosition; });

  var html = '';

  for (var j = 0; j < active.length; j++) {
    var p = active[j];
    var raPills = '';
    for (var r = 0; r < (p.ra || 0); r++) raPills += '<span class="ra-pill">R/A</span>';
    var memoStr = p.memo ? '<span style="color:#9aab9c;font-size:11px;">' + escHtml(p.memo) + '</span>' : '';
    var subExtra = (raPills || memoStr)
      ? '&ensp;' + [raPills, memoStr].filter(function(s){return s;}).join('&ensp;')
      : '';
    html += '<div class="player-item status-active" onclick="openPlayerModal(' + p.id + ')">'
      + '<div class="player-rank">' + (j+1) + '</div>'
      + '<div class="player-info">'
        + '<div class="player-name">' + escHtml(p.name) + '</div>'
        + '<div class="player-sub">Active' + subExtra + '</div>'
      + '</div>'
      + '<div class="player-right"><span class="status-tag tag-active">Playing</span></div>'
      + '</div>';
  }

  if (bust.length > 0) {
    html += '<div class="section-label" style="margin-top:14px">Busted (' + bust.length + ')</div>';
    for (var k = 0; k < bust.length; k++) {
      var bp = bust[k];
      var raPillsBust = '';
      for (var rb = 0; rb < (bp.ra || 0); rb++) raPillsBust += '<span class="ra-pill dim">R/A</span>';
      var memoStrBust = bp.memo ? '<span style="color:#b0b8b0;font-size:11px;">' + escHtml(bp.memo) + '</span>' : '';
      var subExtraBust = (raPillsBust || memoStrBust)
        ? '&ensp;' + [raPillsBust, memoStrBust].filter(function(s){return s;}).join('&ensp;')
        : '';
      html += '<div class="player-item status-bust" onclick="openPlayerModal(' + bp.id + ')">'
        + '<div class="player-rank" style="color:#cccccc;font-size:12px">—</div>'
        + '<div class="player-info">'
          + '<div class="player-name is-bust">' + escHtml(bp.name) + '</div>'
          + '<div class="player-sub">Busted' + subExtraBust + '</div>'
        + '</div>'
        + '<div class="player-right">'
          + '<div class="bust-rank">' + bp.bustPosition + ' / ' + (bp.bustTotal || totalPlayers()) + '</div>'
          + '<span class="status-tag tag-bust">Bust</span>'
        + '</div>'
        + '</div>';
    }
  }

  list.innerHTML = html;
}

function toggleRemovePanel() {
  var panel = document.getElementById('remove-player-panel');
  var chevron = document.getElementById('remove-chevron');
  var open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : '';
  chevron.style.transform = open ? '' : 'rotate(180deg)';
}

function renderRemovePlayers() {
  var el = document.getElementById('remove-player-list');
  if (!el) return;
  if (!state.players.length) {
    el.innerHTML = '<p style="font-size:13px;color:#9aab9c;font-family:\'Inter\',sans-serif;">No players added yet.</p>';
    return;
  }
  var html = '';
  for (var i = 0; i < state.players.length; i++) {
    var p = state.players[i];
    var dot = p.status === 'bust' ? '#cccccc' : '#2e7d44';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #e0e5db;">'
      + '<div style="width:8px;height:8px;border-radius:50%;background:' + dot + ';flex-shrink:0;"></div>'
      + '<div style="flex:1;font-size:14px;font-weight:600;color:#1a2a1c;font-family:\'Inter\',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(p.name) + '</div>'
      + '<button class="btn btn-ghost btn-sm" style="color:#b53a2e;border-color:#f0c8c4;padding:5px 10px;" onclick="handleRemove(' + p.id + ', this)">Remove</button>'
      + '</div>';
  }
  el.innerHTML = html;
}

function handleRemove(id, btn) {
  // 連打防止: ボタンを即座にdisable
  btn.disabled = true;
  btn.style.opacity = '0.4';
  removePlayer(id);
}

function removePlayer(id) {
  var idx = -1;
  for (var i = 0; i < state.players.length; i++) {
    if (state.players[i].id === id) { idx = i; break; }
  }
  if (idx === -1) return;
  var removed = state.players[idx];
  var name = removed.name;

  if (removed.status === 'bust') {
    for (var k = 0; k < state.players.length; k++) {
      var q = state.players[k];
      if (q.status === 'bust' && q.id !== id) {
        if (q.bustPosition > 1) q.bustPosition -= 1;
        if (q.bustTotal > 0) q.bustTotal -= 1;
      }
    }
  } else {
    for (var m = 0; m < state.players.length; m++) {
      var r = state.players[m];
      if (r.status === 'bust') {
        if (r.bustPosition > 1) r.bustPosition -= 1;
        if (r.bustTotal > 0) r.bustTotal -= 1;
      }
    }
  }

  state.players.splice(idx, 1);
  saveState(); updateAll();
  showToast(name + ' removed.');
}

/* ---- Tabs ---- */
function switchTab(name) {
  var tabs = ['players', 'settings'];
  var tabEls = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    document.getElementById('tab-' + tabs[i]).style.display = tabs[i] === name ? '' : 'none';
    if (tabEls[i]) tabEls[i].classList[tabs[i] === name ? 'add' : 'remove']('active');
  }
}

/* ---- Modal overlay close ---- */
var overlays = document.querySelectorAll('.modal-overlay');
for (var oi = 0; oi < overlays.length; oi++) {
  overlays[oi].addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
      selectedPlayerId = null;
    }
  });
}

loadState();
</script>
